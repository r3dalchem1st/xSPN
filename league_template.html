<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>__COMPETITION_NAME__</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#cc0000;--dark:#1a1a1a;--bg:#f0f0f0;--card:#ffffff;--border:#e0e0e0;--text:#111;--muted:#666;--win:#2e7d32}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',system-ui,sans-serif;min-height:100vh}
header{background:var(--dark);padding:12px 20px;display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--red)}
.xspn-logo{background:var(--red);color:#fff;font-size:1.25rem;font-weight:600;letter-spacing:2px;padding:4px 10px;border-radius:3px;flex-shrink:0}
.xspn-logo span{opacity:.65;font-weight:400}
.hdr-text h1{font-size:.98rem;font-weight:600;color:#fff;letter-spacing:.2px}
.hdr-text p{color:#888;font-size:.76rem;margin-top:2px}
.xspn-nav{display:flex;background:var(--dark);border-bottom:2px solid var(--red);overflow-x:auto}
.xspn-nav a{padding:10px 16px;font-size:.82rem;font-weight:500;color:#888;white-space:nowrap;text-decoration:none;border-bottom:3px solid transparent;transition:all .15s;letter-spacing:.2px}
.xspn-nav a:hover{color:#fff}
.xspn-nav a.active{color:#fff;background:var(--red);border-bottom-color:var(--red)}
main{max-width:900px;margin:0 auto;padding:28px 20px}
.subtitle{color:var(--muted);font-size:.84rem;margin-bottom:18px}
.standings-card{background:var(--card);border:1px solid var(--border);border-radius:5px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:#f5f5f5;color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;text-align:center;border-bottom:2px solid var(--border)}
th:nth-child(2){text-align:left}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:.86rem;text-align:center}
td:nth-child(2){text-align:left;font-weight:600}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafafa}
tbody tr:nth-child(-n+__TOP_ZONE__) td:nth-child(2){border-left:3px solid var(--win)}
tbody tr:nth-last-child(-n+__RELEGATION_ZONE__) td:nth-child(2){border-left:3px solid var(--red)}
.odds{font-weight:600}
.legend{margin-top:12px;font-size:.76rem;color:var(--muted)}
.swatch{display:inline-block;width:10px;height:10px;margin-right:4px;border-radius:2px}
</style>
</head>
<body>
<header>
  <div class="xspn-logo">x<span>SPN</span></div>
  <div class="hdr-text">
    <h1>__COMPETITION_NAME__</h1>
    <p>Dixon-Coles &middot; Elo priors &middot; Monte Carlo simulation</p>
  </div>
</header>
__NAV__
<main>
  <div class="subtitle">xSPN model projections — generated __GENERATED_DATE__ &middot; __N_SIMS__ simulated seasons</div>
  <div class="standings-card">
  <table>
    <thead>
      <tr><th>Pos</th><th>Team</th><th>Pld</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th>Title %</th><th>Relegation %</th></tr>
    </thead>
    <tbody>
__STANDINGS_ROWS__
    </tbody>
  </table>
  </div>
  <div class="legend">
    <span class="swatch" style="background:var(--win)"></span>Top __TOP_ZONE__ &nbsp;&nbsp;
    <span class="swatch" style="background:var(--red)"></span>Relegation zone (bottom __RELEGATION_ZONE__)
  </div>
</main>
</body>
</html>
