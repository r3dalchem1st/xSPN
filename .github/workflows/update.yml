name: Update WC 2026 Predictions

on:
  schedule:
    # GitHub scheduled runs are best-effort: often delayed by hours and
    # sometimes dropped entirely under load. Mitigations: (1) schedule a few
    # minutes off the top of the hour (load spikes at :00), and (2) use redundant
    # slots so a dropped run is backed up by a later one. Times are UTC; during
    # the WC Barcelona is CEST (UTC+2). GitHub cron does NOT follow DST.
    #   22:43 UTC = 00:43 Barcelona — catches the prior evening's matches
    #   05:43 UTC = 07:43 Barcelona — catches US-evening games (backup)
    #   07:43 UTC = 09:43 Barcelona — final morning refresh
    - cron: '43 22 * * *'
    - cron: '43 5 * * *'
    - cron: '43 7 * * *'
  workflow_dispatch:
    # Allows you to trigger it manually from the GitHub website

# Serialise runs so overlapping schedules/manual triggers never race on push.
# cancel-in-progress: false → a new run waits for the in-flight one to finish.
concurrency:
  group: update-predictions
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy scipy requests

      - name: Backtest quality gate (fails on model regression)
        run: python backtest.py

      - name: Snapshot pre-match predictions
        run: python snapshot_predictions.py

      - name: Fetch new match results
        env:
          FD_API_KEY: ${{ secrets.FD_API_KEY }}
        run: python fetch_matches.py

      - name: Score predictions against actual results
        run: python score_predictions.py

      - name: Refit model (Dixon-Coles + Elo)
        run: python fit_improved.py

      - name: Run simulations (75,000 tournaments)
        run: python sim_improved.py

      - name: Generate bracket predictions
        run: python bracket_predictor.py

      - name: Build index.html
        run: python build_html.py

      - name: Commit and push updated files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html model_params.json wc2026_v2_results.json bracket_data.json fetched_matches.json predictions_snapshot.json results_accuracy.json win_history.json backtest_results.json
          git diff --staged --quiet && echo "No changes to commit." && exit 0
          git commit -m "Auto-update predictions: $(date +'%Y-%m-%d')"
          # Retry push against concurrent updates (overlapping runs / manual pushes):
          # rebase the auto-commit onto the latest main and try again.
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "Push rejected (attempt $i) — rebasing on latest main and retrying..."
            git pull --rebase --autostash origin main || true
          done
          echo "Push failed after 5 attempts." >&2
          exit 1
