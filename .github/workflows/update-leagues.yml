name: Update Round-Robin League Predictions

on:
  schedule:
    # Once daily — round-robin league fixtures are known far in advance and
    # don't need the World Cup workflow's 4x/day cadence (that existed for
    # same-day knockout-round snapshot/score updates during live matches).
    # 21:40 UTC reuses update.yml's first existing cron time exactly.
    - cron: '40 21 * * *'
  workflow_dispatch:

concurrency:
  group: update-leagues
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      competitions: ${{ steps.list.outputs.competitions }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - id: list
        run: echo "competitions=$(python list_competitions.py)" >> "$GITHUB_OUTPUT"

  update:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        competition: ${{ fromJson(needs.discover.outputs.competitions) }}
      max-parallel: 1
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy scipy requests

      - name: Fetch new match results
        run: python fetch_league.py competitions/${{ matrix.competition }}.json

      - name: Refit model (Dixon-Coles + Elo)
        run: python fit_league.py competitions/${{ matrix.competition }}.json

      - name: Run season simulation
        run: python sim_league.py competitions/${{ matrix.competition }}.json

      - name: Snapshot pre-match predictions
        run: python snapshot_league.py competitions/${{ matrix.competition }}.json

      - name: Score predictions against actual results
        run: python score_league.py competitions/${{ matrix.competition }}.json

      - name: Validate prediction snapshot (fails on fabricated/mislabeled locks)
        run: python validate_snapshot_league.py competitions/${{ matrix.competition }}.json

      - name: Build standings page
        run: python build_league_html.py competitions/${{ matrix.competition }}.json

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add competitions/${{ matrix.competition }}/fetched_matches.json \
                  competitions/${{ matrix.competition }}/schedule.json \
                  competitions/${{ matrix.competition }}/model_params.json \
                  competitions/${{ matrix.competition }}/league_sim.json \
                  competitions/${{ matrix.competition }}/predictions_snapshot.json \
                  competitions/${{ matrix.competition }}/results_accuracy.json \
                  competitions/${{ matrix.competition }}/index.html
          git diff --staged --quiet && echo "No changes to commit." && exit 0
          git commit -m "Auto-update ${{ matrix.competition }}: $(date +'%Y-%m-%d')"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "Push rejected (attempt $i) — rebasing on latest main and retrying..."
            git pull --rebase --autostash origin main || true
          done
          echo "Push failed after 5 attempts." >&2
          exit 1
