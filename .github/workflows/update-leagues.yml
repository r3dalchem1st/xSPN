name: Update Round-Robin League Predictions

on:
  schedule:
    # Once daily — round-robin league fixtures are known far in advance and
    # don't need the World Cup workflow's 4x/day cadence (that existed for
    # same-day knockout-round snapshot/score updates during live matches).
    # 10:40 UTC is deliberately offset from all 4 of update.yml's slots
    # (21:40/00:20/04:40/18:40 UTC) -- both workflows rebuild the shared
    # index.html hub page, and same-minute crons hit that race every day.
    - cron: '40 10 * * *'
  workflow_dispatch:

concurrency:
  group: update-leagues
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      competitions: ${{ steps.list.outputs.competitions }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - id: list
        run: echo "competitions=$(python list_competitions.py)" >> "$GITHUB_OUTPUT"

  update:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        competition: ${{ fromJson(needs.discover.outputs.competitions) }}
      max-parallel: 1
      fail-fast: false
    env:
      # Passed through env, not interpolated directly into run: blocks below
      # (GitHub's own documented script-injection risk: a raw ${{ }} in a
      # shell script is substituted BEFORE the shell parses it, so a slug
      # containing e.g. `;` or `$()` could break word-splitting or execute
      # arbitrary shell. Low real risk today since slugs come only from
      # filenames maintainers control, but the fix is free.)
      COMPETITION: ${{ matrix.competition }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy scipy requests

      - name: Fetch new match results
        run: python fetch_league.py "competitions/$COMPETITION.json"

      - name: Refit model (Dixon-Coles + Elo)
        run: python fit_league.py "competitions/$COMPETITION.json"

      - name: Run season simulation
        run: python sim_league.py "competitions/$COMPETITION.json"

      - name: Snapshot pre-match predictions
        run: python snapshot_league.py "competitions/$COMPETITION.json"

      - name: Score predictions against actual results
        run: python score_league.py "competitions/$COMPETITION.json"

      - name: Validate prediction snapshot (fails on fabricated/mislabeled locks)
        run: python validate_snapshot_league.py "competitions/$COMPETITION.json"

      - name: Build standings page
        run: python build_league_html.py "competitions/$COMPETITION.json"

      - name: Build site-wide hub page
        # Rebuilds root index.html (every competition's card, including this
        # one's fresh title-odds snapshot) whenever any competition's data
        # changes. The WC's own workflow (update.yml) rebuilds the same hub
        # for the same reason on its own schedule -- whichever last touched
        # the site keeps the hub current.
        run: python build_hub_html.py

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add "competitions/$COMPETITION/fetched_matches.json" \
                  "competitions/$COMPETITION/schedule.json" \
                  "competitions/$COMPETITION/model_params.json" \
                  "competitions/$COMPETITION/league_sim.json" \
                  "competitions/$COMPETITION/predictions_snapshot.json" \
                  "competitions/$COMPETITION/results_accuracy.json" \
                  "competitions/$COMPETITION/index.html" \
                  index.html
          git diff --staged --quiet && echo "No changes to commit." && exit 0
          git commit -m "Auto-update $COMPETITION: $(date +'%Y-%m-%d')"
          # index.html is also rebuilt independently by update.yml and by sibling
          # matrix jobs in this same workflow, so a conflict on it is spurious --
          # auto-resolve with -X ours then rebuild it fresh before pushing again.
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "Push rejected (attempt $i) — rebasing on latest main and retrying..."
            git rebase --abort >/dev/null 2>&1 || true
            git pull --rebase --autostash -X ours origin main || { git rebase --abort >/dev/null 2>&1 || true; git pull --no-rebase --autostash -X ours origin main; }
            python build_hub_html.py
            git add index.html
            git commit --amend --no-edit
          done
          echo "Push failed after 5 attempts." >&2
          exit 1
