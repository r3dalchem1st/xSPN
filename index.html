  let h='<div class="groups-grid">';

    const ms=B.group_predictions[g]||[];
    h+=`<div class="group-card"><div class="group-hdr">GROUP ${g}</div>`;
    const st=computeStandings(teams,ms);
    h+=`<table style="width:100%;border-collapse:collapse;font-size:.76rem">
      <thead><tr style="background:#f5f5f5">
        <th style="padding:5px 8px;text-align:left;color:var(--muted);font-weight:600;font-size:.7rem;border-bottom:1px solid var(--border)">Team</th>
        <th style="padding:5px 4px;text-align:center;color:var(--muted);font-weight:600;font-size:.7rem;border-bottom:1px solid var(--border)">W</th>
        <th style="padding:5px 4px;text-align:center;color:var(--muted);font-weight:600;font-size:.7rem;border-bottom:1px solid var(--border)">D</th>
        <th style="padding:5px 4px;text-align:center;color:var(--muted);font-weight:600;font-size:.7rem;border-bottom:1px solid var(--border)">L</th>
        <th style="padding:5px 6px;text-align:center;color:var(--red);font-weight:700;font-size:.7rem;border-bottom:1px solid var(--border)">Pts</th>
      </tr></thead><tbody>`;
    st.forEach((row,i)=>{
      const ql=i<2?'3px solid var(--red)':'3px solid transparent';
      h+=`<tr style="border-left:${ql};border-bottom:1px solid var(--border)">
        <td style="padding:4px 8px">${ft(row.t)}</td>
        <td style="padding:4px 4px;text-align:center;color:var(--muted)">${row.w.toFixed(1)}</td>
        <td style="padding:4px 4px;text-align:center;color:var(--muted)">${row.d.toFixed(1)}</td>
        <td style="padding:4px 4px;text-align:center;color:var(--muted)">${row.l.toFixed(1)}</td>
        <td style="padding:4px 6px;text-align:center;font-weight:700;color:${i<2?'var(--red)':'var(--text)'}">
          ${row.pts.toFixed(1)}</td>
      </tr>`;
    });
    h+='</tbody></table><div style="border-top:2px solid var(--border);padding-top:4px">';
    ms.forEach(m=>{
      const hw=(m.ph*100).toFixed(0),dw=(m.pd*100).toFixed(0),aw=(m.pa*100).toFixed(0);
      const isH=m.winner===m.home||m.likely_winner===m.home;
      h+=`<div class="match-row">
        <span class="t" style="${isH?'color:var(--red);font-weight:600':''}">${ft(m.home)}</span>
        <span class="sc">${m.score}</span>
        <span class="t r" style="${!isH?'color:var(--red);font-weight:600':''}">${ft(m.away)}</span></div>
      <div class="odds"><span style="color:var(--win)">${hw}%</span> &middot;
        <span style="color:var(--draw)">${dw}%</span> &middot;
        <span style="color:var(--lose)">${aw}%</span></div>`;
    });
    h+='</div></div>';
  });
  document.getElementById('tab-groups').innerHTML=h+'</div>';
})();
(function(){
  function bm(m){
    if(!m)return'<div class="bm"><em style="color:var(--hint);font-size:.72rem">TBD</em></div>';
    const isH=m.winner===m.home;const sc=m.score.split('–');
    return`<div class="bm"><div class="bm-t ${isH?'win':'lose'}">${ft(m.home)}<span class="bm-sc">${sc[0]||0}</span></div>
      <div class="bm-t ${!isH?'win':'lose'}">${ft(m.away)}<span class="bm-sc">${sc[1]||0}</span></div>
      <div class="bm-pct">${m.win_pct}% ${m.winner}</div></div>`;
  }
  let h='<div class="bracket-wrap"><div class="bracket">';
  [['Round of 32',B.r32],['Round of 16',B.r16],['Quarter-Finals',B.qf],['Semi-Finals',B.sf]].forEach(([title,ms])=>{
    h+=`<div class="br-col"><div class="br-title">${title}</div><div class="br-matches">`;
    ms.forEach(m=>h+=bm(m));h+='</div></div>';
  });
  h+=`<div class="br-col"><div class="br-title">Final + 3rd</div><div class="br-matches">
    ${bm(B.final)}<div style="font-size:.7rem;color:var(--hint);text-align:center;padding:6px 0">3rd Place</div>
    ${bm(B.third_place)}</div></div>`;
  const rf=B.reach_final||{};
  const top=Object.entries(rf).slice(0,6).map(([t,p])=>`${ft(t)} <strong>${p}%</strong>`).join(' &middot; ');
  const legend=`<div style="max-width:780px;margin:16px auto 0;font-size:.76rem;color:var(--muted);line-height:1.55">
    <strong>How to read this:</strong> the bracket shows the single <em>most-likely path</em> — at each match the favourite advances. Because co-favourites drawn into the same half meet before the final, a strong team can exit early even with high title odds, so the shown final isn't always the two best teams overall.
    ${top?'<div style="margin-top:6px"><strong>Most likely finalists</strong> (chance of reaching the final): '+top+'</div>':''}</div>`;
  document.getElementById('tab-bracket').innerHTML=h+'</div></div>'+legend;
})();
(function(){
  const all=[];
  Object.entries(B.group_predictions).forEach(([g,ms])=>ms.forEach(m=>all.push({...m,stage:'Group '+g,sk:'group',badge:'sb-g'})));
  [{k:'r32',l:'R32',b:'sb-r32'},{k:'r16',l:'R16',b:'sb-r16'},{k:'qf',l:'QF',b:'sb-qf'},{k:'sf',l:'SF',b:'sb-sf'}]
    .forEach(({k,l,b})=>(B[k]||[]).forEach(m=>all.push({...m,stage:l,sk:k,badge:b})));
  all.push({...B.final,stage:'Final',sk:'final',badge:'sb-f'});
  all.push({...B.third_place,stage:'3rd Place',sk:'3rd',badge:'sb-3'});
  // Attach real fixture date + actual result (keyed by sorted team pair) from SCH;
  // knockout predicted matchups fall back to a per-round ordering date.
  const GROUP_FALLBACK='2026-06-27';   // keep date-less group games in the group block
  all.forEach(m=>{
    const s=SCH[[m.home,m.away].sort().join('|')];
    const real=s&&s.date;
    m._date=real||(m.sk!=='group'?ROUND_DATE[m.sk]:null);                       // shown date
    m._sort=real||(m.sk==='group'?GROUP_FALLBACK:ROUND_DATE[m.sk])||'9999-99-99'; // ordering key
    const g=s&&s.goals;
    m._result=(g&&g[m.home]!=null&&g[m.away]!=null)?`${g[m.home]}–${g[m.away]}`:null;
  });
  all.sort((a,b)=>String(a._sort).localeCompare(String(b._sort)));
  window._AM=all;
  function rowHtml(m){
    const pct=m.win_pct!=null?m.win_pct+'%':(m.ph?`${(m.ph*100).toFixed(0)}/${(m.pd*100).toFixed(0)}/${(m.pa*100).toFixed(0)}%`:'');
    const w=m.winner||m.likely_winner;
    const res=m._result?`<strong>${m._result}</strong>`:'<span style="color:var(--hint)">&mdash;</span>';
    return`<tr><td style="color:var(--hint);font-size:.74rem;white-space:nowrap">${fmtDate(m._date)}</td>
      <td><span class="sbadge ${m.badge}">${m.stage}</span></td>
      <td>${ft(m.home)}</td><td style="text-align:center;color:var(--hint)">${m.score}</td>
      <td>${ft(m.away)}</td><td style="text-align:center">${res}</td>
      <td class="win-cell">${ft(w)}</td>
      <td style="color:var(--hint);font-size:.76rem">${pct}</td></tr>`;
  }
  window._rowHtml=rowHtml;
  document.getElementById('tab-matches').innerHTML=
    '<div class="filter-row">'+['all','group','r32','r16','qf','sf','final'].map((f,i)=>
      `<button class="fb${i===0?' active':''}" onclick="filt('${f}',this)">${['All 104','Groups','R32','R16','QF','SF','Final'][i]}</button>`
    ).join('')+'</div>'+
    `<table><thead><tr><th>Date</th><th>Stage</th><th>Home</th><th>Pred</th><th>Away</th><th>Result</th><th>Winner</th><th>Odds</th></tr></thead>
    <tbody id="mrows">${all.map(rowHtml).join('')}</tbody></table>`;
})();
window.filt=function(f,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  const arr=f==='all'?window._AM:window._AM.filter(m=>f==='group'?m.sk==='group':m.sk===f);
  document.getElementById('mrows').innerHTML=arr.map(window._rowHtml).join('');
};
(function(){
  const ranked=Object.entries(R).sort((a,b)=>b[1].win-a[1].win);
  const [[t1,r1],[t2,r2],[t3,r3]]=ranked;const mx=r1.win;
  let h=`<div class="podium-wrap"><div class="sec">Predicted Tournament Winner</div>
  <div style="text-align:center;margin:14px 0">
    <div>${FL[t1]?`<img src="${fi(FL[t1])}" style="height:48px;border-radius:3px">`:'&#127942;'}</div>
    <div style="font-size:1.4rem;font-weight:600;color:var(--red);margin-top:6px">${t1}</div>
    <div style="color:var(--muted)">${(r1.win*100).toFixed(1)}% win probability</div></div>
  <div class="sec">Predicted Podium</div>
  <div class="pod-stage">
    <div class="pod pod-2"><div>${FL[t2]?`<img src="${fi(FL[t2])}" style="height:32px;border-radius:2px">`:''}
      </div><div class="pod-bar"><div class="pod-medal">&#129352;</div></div>
      <div class="pod-name">${t2}</div><div class="pod-pct">${(r2.win*100).toFixed(1)}%</div></div>
    <div class="pod pod-1"><div>${FL[t1]?`<img src="${fi(FL[t1])}" style="height:32px;border-radius:2px">`:''}
      </div><div class="pod-bar"><div class="pod-medal">&#129351;</div></div>
      <div class="pod-name">${t1}</div><div class="pod-pct">${(r1.win*100).toFixed(1)}%</div></div>
    <div class="pod pod-3"><div>${FL[t3]?`<img src="${fi(FL[t3])}" style="height:32px;border-radius:2px">`:''}
      </div><div class="pod-bar"><div class="pod-medal">&#129353;</div></div>
      <div class="pod-name">${t3}</div><div class="pod-pct">${(r3.win*100).toFixed(1)}%</div></div></div>
  <div class="sec">Top 10 Contenders</div><table class="top10">`;
  ranked.slice(0,10).forEach(([t,r],i)=>{
    const bw=(r.win/mx*100).toFixed(1);const m=i===0?'&#127945;':i===1?'&#129352;':i===2?'&#129353;':'';
    h+=`<tr><td style="width:26px;color:var(--muted);font-weight:600">${i+1}</td>
      <td style="width:170px">${ft(t)} ${m}</td>
      <td><div class="top10-bar" style="width:${bw}%"></div></td>
      <td style="width:50px;text-align:right;font-weight:600">${(r.win*100).toFixed(1)}%</td></tr>`;
  });
  const fin=B.final,tp=B.third_place;
  h+=`</table><div class="sec" style="margin-top:20px">Predicted Final</div>
  <div class="fin-box"><div style="font-size:1.15rem;font-weight:600">${ft(fin.home)}
    <span style="color:var(--red)">${fin.score}</span> ${ft(fin.away)}</div>
    <div style="font-size:.83rem;color:var(--muted);margin-top:5px">Winner:
      <strong style="color:var(--red)">${fin.winner}</strong> &middot; ${fin.win_pct}% chance</div></div>
  <div style="font-size:.8rem;color:var(--muted);margin:8px 0 3px">3rd Place Match</div>
  <div class="fin-box" style="border-left-color:var(--border)"><div>${ft(tp.home)}
    <strong>${tp.score}</strong> ${ft(tp.away)}</div>
    <div style="font-size:.78rem;color:var(--muted);margin-top:4px">${tp.winner} &middot; ${tp.win_pct}%</div></div></div>`;
  document.getElementById('tab-podium').innerHTML=h;
})();
(function(){
  const s=AC.summary, ms=AC.matches||[];
  if(!s.total_matches){
    document.getElementById('tab-results').innerHTML=
      '<div style="padding:48px;text-align:center;color:var(--hint);font-size:.95rem">No results yet &mdash; check back once the tournament starts.</div>';
    return;
  }
  const brier_note=s.avg_brier<0.5?'good (baseline 0.67)':'vs baseline 0.67';
  let h=`<div class="acc-cards">
    <div class="acc-card"><div class="acc-lbl">Correct Winners</div>
      <div class="acc-val">${s.correct_winners}/${s.total_matches}</div>
      <div class="acc-sub">${(s.accuracy*100).toFixed(1)}% accuracy</div></div>
    <div class="acc-card"><div class="acc-lbl">Avg Goal Error</div>
      <div class="acc-val">${s.avg_goal_error.toFixed(2)}</div>
      <div class="acc-sub">goals off per match</div></div>
    <div class="acc-card"><div class="acc-lbl">Avg Brier Score</div>
      <div class="acc-val">${s.avg_brier.toFixed(3)}</div>
      <div class="acc-sub">${brier_note}</div></div>
    <div class="acc-card"><div class="acc-lbl">Avg Log-Loss</div>
      <div class="acc-val">${(s.avg_logloss||0).toFixed(3)}</div>
      <div class="acc-sub">lower better (rand 1.10)</div></div>
  </div>`;
  if(s.reliability&&s.reliability.length){
    h+=`<div style="margin:16px 0 6px;font-size:.82rem;color:var(--muted);font-weight:600">Calibration &mdash; model confidence vs how often it happened</div>
    <table style="margin-bottom:20px"><thead><tr>
      <th>Confidence</th><th style="text-align:center">Predicted</th>
      <th style="text-align:center">Actual</th><th style="text-align:center">Matches</th>
    </tr></thead><tbody>`;
    s.reliability.forEach(r=>{
      const diff=Math.abs(r.predicted-r.actual);
      const col=diff<=0.1?'var(--win)':diff<=0.2?'var(--draw)':'var(--lose)';
      h+=`<tr><td>${r.bin}</td>
        <td style="text-align:center;color:var(--hint)">${(r.predicted*100).toFixed(0)}%</td>
        <td style="text-align:center;color:${col};font-weight:600">${(r.actual*100).toFixed(0)}%</td>
        <td style="text-align:center;color:var(--hint)">${r.n}</td></tr>`;
    });
    h+='</tbody></table>';
  }
  h+=`<table><thead><tr>
    <th>Date</th><th>Stage</th><th>Match</th>
    <th style="text-align:center">Predicted</th>
    <th style="text-align:center">Actual</th>
    <th style="text-align:center">Winner</th>
    <th style="text-align:center">Goal&nbsp;Err</th>
    <th style="text-align:center">Brier</th>
  </tr></thead><tbody>`;
  ms.forEach(m=>{
    const ok=m.correct_winner;
    const wmark=ok?'<span class="res-ok">&#10003;</span>':'<span class="res-err">&#10007;</span>';
    const errCol=m.total_goal_error===0?'var(--win)':m.total_goal_error<=2?'var(--draw)':'var(--lose)';
    h+=`<tr>
      <td style="color:var(--hint);font-size:.78rem;white-space:nowrap">${m.date}</td>
      <td style="color:var(--hint);font-size:.78rem">${/^[A-L]$/.test(m.group)?'Grp '+m.group:m.group}</td>
      <td>${ft(m.home)} <span style="color:var(--hint)">vs</span> ${ft(m.away)}</td>
      <td style="text-align:center;color:var(--hint)">${m.predicted_score}</td>
      <td style="text-align:center;font-weight:700">${m.actual_score}</td>
      <td style="text-align:center">${wmark} ${ft(m.actual_winner)}</td>
      <td style="text-align:center;color:${errCol};font-weight:600">${m.total_goal_error}</td>
      <td style="text-align:center;color:var(--hint);font-size:.8rem">${m.brier.toFixed(3)}</td>
    </tr>`;
  });
  h+='</tbody></table>';
  document.getElementById('tab-results').innerHTML=h;
})();
</script>
</body>
</html>
