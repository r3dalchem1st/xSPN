<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>xSPN &mdash; 2026 World Cup Predictions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--red:#cc0000;--dark:#1a1a1a;--bg:#f0f0f0;--card:#ffffff;--border:#e0e0e0;--text:#111;--muted:#666;--hint:#999;--win:#2e7d32;--draw:#e07000;--lose:#c62828}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',system-ui,sans-serif;min-height:100vh}
header{background:var(--dark);padding:12px 20px;display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--red)}
.xspn-logo{background:var(--red);color:#fff;font-size:1.25rem;font-weight:600;letter-spacing:2px;padding:4px 10px;border-radius:3px;flex-shrink:0}
.xspn-logo span{opacity:.65;font-weight:400}
.hdr-text h1{font-size:.98rem;font-weight:600;color:#fff;letter-spacing:.2px}
.hdr-text p{color:#888;font-size:.76rem;margin-top:2px}
.updated{font-size:.7rem;color:#555;margin-top:1px}
.tabs{display:flex;background:var(--dark);border-bottom:2px solid var(--red);overflow-x:auto;position:sticky;top:0;z-index:10}
.tab{padding:10px 16px;cursor:pointer;font-size:.82rem;font-weight:500;color:#888;white-space:nowrap;border-bottom:3px solid transparent;transition:all .15s;letter-spacing:.2px}
.tab:hover{color:#fff}.tab.active{color:#fff;background:var(--red);border-bottom-color:var(--red)}
.pane{display:none;padding:20px;max-width:1100px;margin:0 auto}.pane.active{display:block}
table{width:100%;border-collapse:collapse}
th{background:#f5f5f5;color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);position:sticky;top:42px}
.group-card th{position:static;top:auto}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:.86rem}
tr:hover td{background:#fafafa}
.bar-bg{background:#e8e8e8;border-radius:3px;height:7px;width:110px}
.bar-fill{height:100%;border-radius:3px;background:var(--red)}
.pct-high{color:#cc0000;font-weight:600}.pct-mid{color:#e07000;font-weight:600}.pct-low{color:var(--hint)}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.group-hdr{background:var(--dark);padding:7px 12px;font-weight:600;color:#fff;letter-spacing:1.5px;font-size:.82rem;display:flex;align-items:center;gap:7px}
.group-hdr::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0}
.match-row{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-bottom:1px solid var(--border);font-size:.8rem;gap:4px}
.t{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.t.r{text-align:right}
.sc{background:var(--dark);color:#fff;padding:2px 7px;border-radius:2px;font-weight:600;font-size:.82rem;min-width:34px;text-align:center}
.odds{font-size:.7rem;color:var(--hint);text-align:center;padding:1px 10px 5px}
.bracket-wrap{overflow-x:auto}.bracket{display:flex;gap:0;min-width:860px}
.br-col{display:flex;flex-direction:column;flex:1;padding:0 5px}
.br-title{text-align:center;font-size:.7rem;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:.8px;padding:6px 0;background:var(--red);border-radius:3px;margin-bottom:8px}
.br-matches{display:flex;flex-direction:column;justify-content:space-around;flex:1}
.bm{background:var(--card);border:1px solid var(--border);border-radius:3px;margin:2px 0;padding:5px 7px;font-size:.75rem}
.bm-t{display:flex;align-items:center;gap:3px;padding:2px 0}
.bm-t.win{color:var(--dark);font-weight:600}.bm-t.lose{color:var(--hint)}
.bm-sc{margin-left:auto;font-weight:600}.bm-pct{font-size:.68rem;color:var(--hint);text-align:center;padding-top:2px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.fb{padding:4px 12px;border-radius:3px;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer;font-size:.78rem;font-family:'Barlow',sans-serif;transition:all .12s}
.fb.active{background:var(--red);color:#fff;border-color:var(--red)}
.sbadge{display:inline-block;padding:1px 6px;border-radius:2px;font-size:.68rem;font-weight:600}
.sb-g{background:#e8f0fb;color:#1a56a0}.sb-r32{background:#e8f5e9;color:#2e7d32}
.sb-r16{background:#f3e8fd;color:#6b21a8}.sb-qf{background:#fff3e0;color:#b35900}
.sb-sf{background:#ffebee;color:#c62828}.sb-f{background:#1a1a1a;color:#fff}
.sb-3{background:#e0f7fa;color:#00838f}.win-cell{color:var(--red);font-weight:600}
.podium-wrap{max-width:560px;margin:0 auto}
.pod-stage{display:flex;align-items:flex-end;justify-content:center;gap:6px;margin:24px 0 16px}
.pod{text-align:center;display:flex;flex-direction:column;align-items:center}
.pod-bar{width:80px;background:#eee;border:1px solid var(--border);border-bottom:none;border-radius:3px 3px 0 0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px}
.pod-1 .pod-bar{height:130px;background:#fff0f0;border-color:var(--red)}.pod-2 .pod-bar{height:95px}.pod-3 .pod-bar{height:65px}
.pod-medal{font-size:1.4rem}.pod-name{font-weight:600;font-size:.88rem;margin-top:4px}.pod-pct{font-size:.78rem;color:var(--muted)}
.sec{font-size:.82rem;font-weight:600;margin:18px 0 8px;border-bottom:2px solid var(--border);padding-bottom:5px;color:var(--dark);text-transform:uppercase;letter-spacing:.6px}
.top10 td{padding:7px 8px;border-bottom:1px solid var(--border)}
.top10-bar{height:7px;background:var(--red);border-radius:2px}
.fin-box{background:#fff;border:1px solid var(--border);border-left:4px solid var(--red);border-radius:3px;padding:14px;text-align:center;margin:6px 0}
.acc-cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.acc-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:10px 16px;min-width:130px}
.acc-lbl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.acc-val{font-size:1.35rem;font-weight:700;color:var(--red);margin:3px 0}
.acc-sub{font-size:.74rem;color:var(--hint)}
.res-ok{color:var(--win);font-weight:700}.res-err{color:var(--lose);font-weight:700}
</style>
</head>
<body>
<header>
  <div class="xspn-logo">x<span>SPN</span></div>
  <div class="hdr-text">
    <h1>2026 FIFA World Cup Predictions</h1>
    <p>Dixon-Coles &middot; L2 regularisation &middot; host advantage &middot; 75,000 simulations</p>
    <p class="updated">Last updated: __UPDATED__</p>
  </div>
</header>
<div class="tabs">
  <div class="tab active" onclick="show('results')">Results</div>
  <div class="tab" onclick="show('groups')">Groups</div>
  <div class="tab" onclick="show('matches')">All 104 Matches</div>
  <div class="tab" onclick="show('bracket')">Bracket</div>
  <div class="tab" onclick="show('win')">Win Odds</div>
  <div class="tab" onclick="show('podium')">Podium</div>
</div>
<div id="tab-results" class="pane active"></div>
<div id="tab-groups" class="pane"></div>
<div id="tab-matches" class="pane"></div>
<div id="tab-bracket" class="pane"></div>
<div id="tab-win" class="pane"></div>
<div id="tab-podium" class="pane"></div>
<script>
const R=__RESULTS__;
const B=__BRACKET__;
const ELO=__ELO__;
const SQ=__SQUAD__;
const FL=__FLAGS__;
const GR=__GROUPS__;
const AC=__ACCURACY__;
const WH=__WINHIST__;
const SCH=__SCHEDULE__;
const INJ=__INJURIES__;   // team -> {total_m, players[]} factored into squad value
const CARDS=__CARDS__;    // sorted-pair -> {YC:{team:n}, RC:{team:n}} from played games
// Compact red note under an affected team's name (nothing if no injuries logged).
function injNote(t){
  const x=INJ[t]; if(!x) return '';
  return `<div style="font-size:.66rem;color:#cc0000;font-weight:500" title="Unavailable players, subtracted from squad value">&minus;&euro;${x.total_m}M out: ${x.players.join(', ')}</div>`;
}
// Knockout matchups are predicted (no real fixture yet), so spread each round's
// matches by bracket index across that round's REAL calendar window
// [start, span days] rather than stamping every match in the round one date.
const ROUND_WIN={r32:['2026-06-28',6],r16:['2026-07-04',4],qf:['2026-07-09',3],sf:['2026-07-14',2],'3rd':['2026-07-18',1],final:['2026-07-19',1]};
function addDays(iso,n){const d=new Date(iso+'T00:00:00Z');d.setUTCDate(d.getUTCDate()+n);return d.toISOString().slice(0,10);}
function koDate(sk,i,n){const w=ROUND_WIN[sk];if(!w)return null;const off=n<=1?0:Math.min(w[1]-1,Math.floor(i*w[1]/n));return addDays(w[0],off);}
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(d){if(!d)return'';const p=d.split('-');return p.length===3?MON[+p[1]-1]+' '+(+p[2]):d;}
// Tiny inline SVG sparkline of a team's daily win% (returns '' if <2 days yet).
function spark(team){
  const s=WH[team]; if(!s||s.length<2) return '';
  const w=46,h=14,mx=Math.max(...s),mn=Math.min(...s),rng=(mx-mn)||1;
  const pts=s.map((v,i)=>`${(i/(s.length-1)*w).toFixed(1)},${(h-((v-mn)/rng)*h).toFixed(1)}`).join(' ');
  const up=s[s.length-1]>=s[0], col=up?'#1a8a1a':'#cc0000';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="vertical-align:middle"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.3"/></svg>`;
}
function fi(cc){return cc?'https://flagcdn.com/20x15/'+cc+'.png':''}
function ft(t){const c=FL[t];return c?`<img src="${fi(c)}" style="vertical-align:middle;margin-right:4px;border-radius:1px"> ${t}`:t}
const NODATA='<div style="padding:40px;text-align:center;color:var(--hint);font-size:.9rem">Data unavailable.</div>';
function show(n){
  document.querySelectorAll('.tab').forEach((e,i)=>e.classList.toggle('active',['results','groups','matches','bracket','win','podium'][i]===n));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+n).classList.add('active');
}
(function(){
  if(!Object.keys(R).length){document.getElementById('tab-win').innerHTML=NODATA;return;}
  const ranked=Object.entries(R).sort((a,b)=>b[1].win-a[1].win);
  const mx=ranked[0][1].win;
  let h=`<table><thead><tr><th>#</th><th>Team</th><th title="Title odds (90% range across model variants below)">Win%</th><th title="Change in win % vs the previous day">1d &Delta;</th><th></th><th title="10-day win% trend">Trend</th><th>Final%</th><th>SF%</th><th>QF%</th><th>Elo</th><th>Squad</th></tr></thead><tbody>`;
  ranked.forEach(([t,r],i)=>{
    const m=i===0?'&#129351;':i===1?'&#129352;':i===2?'&#129353;':'';
    const bw=(r.win/mx*100).toFixed(1);
    const pc=r.win>=0.15?'pct-high':r.win>=0.05?'pct-mid':'pct-low';
    const d=r.win_delta;
    let dcell='<span style="color:var(--hint)">&mdash;</span>';
    if(d!==null&&d!==undefined){
      const dp=d*100;
      if(Math.abs(dp)<0.05) dcell='<span style="color:var(--hint)">&plusmn;0.0</span>';
      else if(dp>0) dcell=`<span style="color:#1a8a1a;font-weight:600">&#9650;${dp.toFixed(1)}</span>`;
      else dcell=`<span style="color:#cc0000;font-weight:600">&#9660;${Math.abs(dp).toFixed(1)}</span>`;
    }
    const band=(r.win_hi!=null&&r.win_hi>r.win_lo)?`<div style="font-size:.66rem;color:var(--hint);font-weight:400">${(r.win_lo*100).toFixed(0)}&ndash;${(r.win_hi*100).toFixed(0)}%</div>`:'';
    h+=`<tr><td style="color:var(--hint);font-size:.8rem">${i+1}</td><td>${ft(t)} ${m}${injNote(t)}</td>
    <td><strong class="${pc}">${(r.win*100).toFixed(1)}%</strong>${band}</td>
    <td style="font-size:.8rem;white-space:nowrap">${dcell}</td>
    <td><div class="bar-bg"><div class="bar-fill" style="width:${bw}%"></div></div></td>
    <td>${spark(t)}</td>
    <td>${(r.final*100).toFixed(1)}%</td><td>${(r.sf*100).toFixed(1)}%</td><td>${(r.qf*100).toFixed(1)}%</td>
    <td style="color:var(--hint)">${Math.round(ELO[t]||1500)}</td><td style="color:var(--hint)">&euro;${SQ[t]||0}M</td></tr>`;
  });
  document.getElementById('tab-win').innerHTML=h+'</tbody></table>';
})();
(function(){
  if(!B.group_predictions){document.getElementById('tab-groups').innerHTML=NODATA;return;}
  function played(m){const s=SCH[[m.home,m.away].sort().join('|')];const g=s&&s.goals;
    return (s&&s.status==='FINISHED'&&g&&g[m.home]!=null&&g[m.away]!=null)?[g[m.home],g[m.away]]:null;}
  // ACTUAL standings: only games already played count toward points/W-D-L/goals —
  // no predicted/expected points (unplayed fixtures contribute nothing). GF/GA/GD
  // from real scores; yellow/red cards from CARDS (booking data, when available).
  function computeStandings(teams,ms){
    const S={};const RES={};
    teams.forEach(t=>{S[t]={pts:0,w:0,d:0,l:0,pld:0,gf:0,ga:0,yc:0,rc:0};});
    ms.forEach(m=>{
      const r=played(m); if(!r)return;
      const[hg,ag]=r,H=S[m.home],A=S[m.away];
      H.pld++;A.pld++;H.gf+=hg;H.ga+=ag;A.gf+=ag;A.ga+=hg;
      RES[m.home+'|'+m.away]=[hg,ag];
      if(hg>ag){H.pts+=3;H.w++;A.l++;}
      else if(hg<ag){A.pts+=3;A.w++;H.l++;}
      else{H.pts++;A.pts++;H.d++;A.d++;}
      const c=CARDS[[m.home,m.away].sort().join('|')];
      if(c){const yc=c.YC||{},rc=c.RC||{};
        H.yc+=yc[m.home]||0;A.yc+=yc[m.away]||0;H.rc+=rc[m.home]||0;A.rc+=rc[m.away]||0;}
    });
    const rows=teams.map(t=>({t,...S[t],gd:S[t].gf-S[t].ga}));
    rows.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
    // Head-to-head tiebreaker within clusters tied on pts/gd/gf (FIFA 2026 rules 4-6)
    function h2hSort(cl){
      if(cl.length<2)return cl;
      const cs=new Set(cl.map(r=>r.t));
      const hp={},hd={},hf={};
      cl.forEach(r=>{hp[r.t]=0;hd[r.t]=0;hf[r.t]=0;});
      Object.entries(RES).forEach(([k,[hg,ag]])=>{
        const[h,a]=k.split('|');
        if(!cs.has(h)||!cs.has(a))return;
        hf[h]+=hg;hf[a]+=ag;hd[h]+=hg-ag;hd[a]+=ag-hg;
        if(hg>ag)hp[h]+=3;else if(hg<ag)hp[a]+=3;else{hp[h]++;hp[a]++;}
      });
      const sorted=[...cl].sort((a,b)=>hp[b.t]-hp[a.t]||hd[b.t]-hd[a.t]||hf[b.t]-hf[a.t]);
      // Recursively break remaining sub-ties; if the whole cluster is still equal
      // (circular H2H) there is no further resolution under FIFA rules — leave as-is.
      const out=[];let i=0;
      while(i<sorted.length){
        let j=i+1;
        while(j<sorted.length&&hp[sorted[j].t]===hp[sorted[i].t]&&hd[sorted[j].t]===hd[sorted[i].t]&&hf[sorted[j].t]===hf[sorted[i].t])j++;
        const sub=sorted.slice(i,j);
        // sub.length<cl.length guarantees progress — circular ties fall through as-is
        out.push(...(sub.length>1&&sub.length<cl.length?h2hSort(sub):sub));
        i=j;
      }
      return out;
    }
    const out=[];let i=0;
    while(i<rows.length){
      let j=i+1;
      while(j<rows.length&&rows[j].pts===rows[i].pts&&rows[j].gd===rows[i].gd&&rows[j].gf===rows[i].gf)j++;
      out.push(...h2hSort(rows.slice(i,j)));
      i=j;
    }
    return out;
  }
  let h='<div style="max-width:780px;margin:0 auto 14px;font-size:.76rem;color:var(--muted);line-height:1.5">'
    +'<strong>Standings</strong> reflect <strong>actual results only</strong> — points, W-D-L, goals (GF/GA/GD) and cards (YC/RC) are tallied from games already played (greyed below); fixtures still to come do not count. <em>Pld</em> = games played. '
    +'The predicted winner is each match’s single most-likely result; a draw is rarely any one game’s most-likely outcome even though ~30% of games end level, so look to the draw % in the odds for that.</div>'
    +'<div class="groups-grid">';
  Object.entries(GR).forEach(([g,teams])=>{
    const ms=B.group_predictions[g]||[];
    h+=`<div class="group-card"><div class="group-hdr">GROUP ${g}</div>`;
    const st=computeStandings(teams,ms);
    h+=`<table style="width:100%;border-collapse:collapse;font-size:.76rem">
      <thead><tr style="background:#f5f5f5">
        <th style="padding:5px 8px;text-align:left;color:var(--muted);font-weight:600;font-size:.7rem;border-bottom:1px solid var(--border)">Team</th>
        <th style="padding:5px 4px;text-align:center;color:var(--muted);font-weight:600;font-size:.7rem;border-bottom:1px solid var(--border)" title="Games already played (real)">Pld</th>
        <th style="padding:5px 4px;text-align:center;color:var(--muted);font-weight:600;font-size:.7rem;border-bottom:1px solid var(--border)">W</th>
        <th style="padding:5px 4px;text-align:center;color:var(--muted);font-weight:600;font-size:.7rem;border-bottom:1px solid var(--border)">D</th>
        <th style="padding:5px 4px;text-align:center;color:var(--muted);font-weight:600;font-size:.7rem;border-bottom:1px solid var(--border)">L</th>
        <th style="padding:5px 4px;text-align:center;color:var(--muted);font-weight:600;font-size:.7rem;border-bottom:1px solid var(--border)" title="Goals for">GF</th>
        <th style="padding:5px 4px;text-align:center;color:var(--muted);font-weight:600;font-size:.7rem;border-bottom:1px solid var(--border)" title="Goals against">GA</th>
        <th style="padding:5px 4px;text-align:center;color:var(--muted);font-weight:600;font-size:.7rem;border-bottom:1px solid var(--border)" title="Goal difference">GD</th>
        <th style="padding:5px 6px;text-align:center;color:var(--red);font-weight:700;font-size:.7rem;border-bottom:1px solid var(--border)">Pts</th>
        <th style="padding:5px 4px;text-align:center;color:var(--muted);font-weight:600;font-size:.7rem;border-bottom:1px solid var(--border)" title="Yellow cards">🟨</th>
        <th style="padding:5px 4px;text-align:center;color:var(--muted);font-weight:600;font-size:.7rem;border-bottom:1px solid var(--border)" title="Red cards">🟥</th>
      </tr></thead><tbody>`;
    st.forEach((row,i)=>{
      const ql=i<2?'3px solid var(--red)':'3px solid transparent';
      const gd=(row.gd>0?'+':'')+row.gd;
      h+=`<tr style="border-left:${ql};border-bottom:1px solid var(--border)">
        <td style="padding:4px 8px">${ft(row.t)}</td>
        <td style="padding:4px 4px;text-align:center;color:var(--hint)">${row.pld}</td>
        <td style="padding:4px 4px;text-align:center;color:var(--muted)">${row.w}</td>
        <td style="padding:4px 4px;text-align:center;color:var(--muted)">${row.d}</td>
        <td style="padding:4px 4px;text-align:center;color:var(--muted)">${row.l}</td>
        <td style="padding:4px 4px;text-align:center;color:var(--muted)">${row.gf}</td>
        <td style="padding:4px 4px;text-align:center;color:var(--muted)">${row.ga}</td>
        <td style="padding:4px 4px;text-align:center;color:var(--muted)">${gd}</td>
        <td style="padding:4px 6px;text-align:center;font-weight:700;color:${i<2?'var(--red)':'var(--text)'}">${row.pts}</td>
        <td style="padding:4px 4px;text-align:center;color:var(--hint)">${row.yc||0}</td>
        <td style="padding:4px 4px;text-align:center;color:var(--hint)">${row.rc||0}</td>
      </tr>`;
    });
    h+='</tbody></table><div style="border-top:2px solid var(--border);padding-top:4px">';
    ms.forEach(m=>{
      const r=played(m);
      if(r){   // CONCLUDED game — greyed, real score, real winner bolded (no odds)
        const[hg,ag]=r;
        h+=`<div class="match-row" style="opacity:.5">
          <span class="t" style="${hg>ag?'font-weight:700':''}">${ft(m.home)}</span>
          <span class="sc" title="Full-time result">${hg}–${ag}</span>
          <span class="t r" style="${ag>hg?'font-weight:700':''}">${ft(m.away)}</span></div>`;
        return;
      }
      // UPCOMING game — prediction (white) + odds. Winner = argmax(H/D/A), so the
      // bolded team is always the one leading the odds beside it (draws are rare).
      const hw=(m.ph*100).toFixed(0),dw=(m.pd*100).toFixed(0),aw=(m.pa*100).toFixed(0);
      const win=m.winner||m.likely_winner;
      const isH=win===m.home, isA=win===m.away;
      h+=`<div class="match-row">
        <span class="t" style="${isH?'color:var(--red);font-weight:600':''}">${ft(m.home)}</span>
        <span class="sc">${m.score}</span>
        <span class="t r" style="${isA?'color:var(--red);font-weight:600':''}">${ft(m.away)}</span></div>
      <div class="odds"><span style="color:var(--win)">${hw}%</span> &middot;
        <span style="color:var(--draw)">${dw}%</span> &middot;
        <span style="color:var(--lose)">${aw}%</span></div>`;
    });
    h+='</div></div>';
  });
  document.getElementById('tab-groups').innerHTML=h+'</div>';
})();
(function(){
  if(!B.final||!B.group_predictions){document.getElementById('tab-bracket').innerHTML=NODATA;return;}
  function bm(m){
    if(!m)return'<div class="bm"><em style="color:var(--hint);font-size:.72rem">TBD</em></div>';
    const isH=m.winner===m.home;const sc=(m.score.match(/\d+/g)||[0,0]);  // digits only ("1–1 (p)"->[1,1])
    return`<div class="bm"><div class="bm-t ${isH?'win':'lose'}">${ft(m.home)}<span class="bm-sc">${sc[0]||0}</span></div>
      <div class="bm-t ${!isH?'win':'lose'}">${ft(m.away)}<span class="bm-sc">${sc[1]||0}</span></div>
      <div class="bm-pct">${m.win_pct}% ${m.winner}</div></div>`;
  }
  let h='<div class="bracket-wrap"><div class="bracket">';
  [['Round of 32',B.r32],['Round of 16',B.r16],['Quarter-Finals',B.qf],['Semi-Finals',B.sf]].forEach(([title,ms])=>{
    h+=`<div class="br-col"><div class="br-title">${title}</div><div class="br-matches">`;
    ms.forEach(m=>h+=bm(m));h+='</div></div>';
  });
  h+=`<div class="br-col"><div class="br-title">Final + 3rd</div><div class="br-matches">
    ${bm(B.final)}<div style="font-size:.7rem;color:var(--hint);text-align:center;padding:6px 0">3rd Place</div>
    ${bm(B.third_place)}</div></div>`;
  const rf=B.reach_final||{};
  const top=Object.entries(rf).slice(0,6).map(([t,p])=>`${ft(t)} <strong>${p}%</strong>`).join(' &middot; ');
  const legend=`<div style="max-width:780px;margin:16px auto 0;font-size:.76rem;color:var(--muted);line-height:1.55">
    <strong>How to read this:</strong> the bracket shows the single <em>most-likely path</em> — at each match the favourite advances. Because co-favourites drawn into the same half meet before the final, a strong team can exit early even with high title odds, so the shown final isn't always the two best teams overall.
    ${top?'<div style="margin-top:6px"><strong>Most likely finalists</strong> (chance of reaching the final): '+top+'</div>':''}</div>`;
  document.getElementById('tab-bracket').innerHTML=h+'</div></div>'+legend;
})();
(function(){
  if(!B.group_predictions){document.getElementById('tab-matches').innerHTML=NODATA;return;}
  // Once a match is played its prediction FREEZES to the locked pre-match snapshot
  // (from the Results data) — we never re-predict a completed game with today's model.
  const frozen={};
  (AC.matches||[]).forEach(x=>{frozen[[x.home,x.away].sort().join('|')]=
    {score:x.predicted_score,winner:x.predicted_winner,ph:x.ph,pd:x.pd,pa:x.pa};});
  const all=[];
  Object.entries(B.group_predictions).forEach(([g,ms])=>ms.forEach(m=>all.push({...m,stage:'Group '+g,sk:'group',badge:'sb-g'})));
  [{k:'r32',l:'R32',b:'sb-r32'},{k:'r16',l:'R16',b:'sb-r16'},{k:'qf',l:'QF',b:'sb-qf'},{k:'sf',l:'SF',b:'sb-sf'}]
    .forEach(({k,l,b})=>{const arr=B[k]||[];arr.forEach((m,i)=>all.push({...m,stage:l,sk:k,badge:b,_ko:koDate(k,i,arr.length)}));});
  all.push({...B.final,stage:'Final',sk:'final',badge:'sb-f',_ko:koDate('final',0,1)});
  all.push({...B.third_place,stage:'3rd Place',sk:'3rd',badge:'sb-3',_ko:koDate('3rd',0,1)});
  // Attach real fixture date + actual result (keyed by sorted team pair) from SCH;
  // knockout predicted matchups fall back to a per-round ordering date.
  const GROUP_FALLBACK='2026-06-27';   // keep date-less group games in the group block
  all.forEach(m=>{
    const s=SCH[[m.home,m.away].sort().join('|')];
    const real=s&&s.date;
    m._date=real||(m.sk!=='group'?m._ko:null);                       // shown date
    m._sort=real||(m.sk==='group'?GROUP_FALLBACK:m._ko)||'9999-99-99'; // ordering key
    const g=s&&s.goals;
    const pw=s&&s.pen_winner;
    m._result=(s&&s.status==='FINISHED'&&g&&g[m.home]!=null&&g[m.away]!=null)?`${g[m.home]}–${g[m.away]}`+(pw?' (p)':''):null;
  });
  all.sort((a,b)=>String(a._sort).localeCompare(String(b._sort)));
  window._AM=all;
  function rowHtml(m){
    const fz=m._result?frozen[[m.home,m.away].sort().join('|')]:null;   // frozen once played
    const score=fz?fz.score:m.score;
    const w=fz?fz.winner:(m.winner||m.likely_winner);
    const ph=fz&&fz.ph!=null?fz.ph:m.ph, pd=fz&&fz.pd!=null?fz.pd:m.pd, pa=fz&&fz.pa!=null?fz.pa:m.pa;
    const pct=(fz==null&&m.win_pct!=null)?m.win_pct+'%':(ph!=null?`${(ph*100).toFixed(0)}/${(pd*100).toFixed(0)}/${(pa*100).toFixed(0)}%`:'');
    const conf=ph!=null?Math.max(ph,pd??0,pa??0):0;
    const confBin=conf>=0.75?'75%+':conf>=0.65?'65–75%':conf>=0.55?'55–65%':conf>=0.45?'45–55%':conf>0?'34–45%':'';
    const confClr=conf>=0.75?'var(--win)':conf>=0.65?'#b35900':conf>=0.55?'var(--draw)':'var(--hint)';
    const res=m._result?`<strong>${m._result}</strong>`:'<span style="color:var(--hint)">&mdash;</span>';
    return`<tr><td style="color:var(--hint);font-size:.74rem;white-space:nowrap">${fmtDate(m._date)}</td>
      <td><span class="sbadge ${m.badge}">${m.stage}</span></td>
      <td>${ft(m.home)}</td><td style="text-align:center;color:var(--hint)">${score}</td>
      <td>${ft(m.away)}</td><td style="text-align:center">${res}</td>
      <td class="win-cell">${ft(w)}</td>
      <td style="color:var(--hint);font-size:.76rem">${pct}</td>
      <td style="font-size:.74rem;font-weight:600;color:${confClr}">${confBin}</td></tr>`;
  }
  window._rowHtml=rowHtml;
  // Already-played matches are collapsed behind an expandable divider row, so the
  // table opens on the upcoming fixtures. Filter buttons + the toggle re-draw here.
  let curFilter='all', showPlayed=false;
  function draw(){
    const arr=curFilter==='all'?all:all.filter(m=>curFilter==='group'?m.sk==='group':m.sk===curFilter);
    const played=arr.filter(m=>m._result), upcoming=arr.filter(m=>!m._result);
    let rows='';
    if(played.length){
      rows+=`<tr class="played-toggle" onclick="_togglePlayed()"><td colspan="9" style="cursor:pointer;background:#efefef;color:var(--muted);font-weight:600;font-size:.8rem;padding:9px 12px">`
        +`${showPlayed?'&#9662;':'&#9656;'} ${played.length} completed match${played.length===1?'':'es'} &mdash; tap to ${showPlayed?'hide':'show'}</td></tr>`;
      if(showPlayed) rows+=played.map(rowHtml).join('');
    }
    rows+=upcoming.map(rowHtml).join('');
    document.getElementById('mrows').innerHTML=rows||`<tr><td colspan="9" style="padding:24px;text-align:center;color:var(--hint)">No matches.</td></tr>`;
  }
  window._togglePlayed=function(){showPlayed=!showPlayed; draw();};
  window.filt=function(f,btn){
    document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
    curFilter=f; draw();
  };
  document.getElementById('tab-matches').innerHTML=
    '<div class="filter-row">'+['all','group','r32','r16','qf','sf','final'].map((f,i)=>
      `<button class="fb${i===0?' active':''}" onclick="filt('${f}',this)">${['All 104','Groups','R32','R16','QF','SF','Final'][i]}</button>`
    ).join('')+'</div>'+
    `<table><thead><tr><th>Date</th><th>Stage</th><th>Home</th><th>Pred</th><th>Away</th><th>Result</th><th>Winner</th><th>Odds</th><th>Conf</th></tr></thead>
    <tbody id="mrows"></tbody></table>`;
  draw();
})();
(function(){
  if(!Object.keys(R).length||!B.final||!B.third_place||B.final.winner==='TBD'){
    document.getElementById('tab-podium').innerHTML=NODATA;return;}
  const ranked=Object.entries(R).sort((a,b)=>b[1].win-a[1].win);
  const mx=ranked[0][1].win;
  // Podium = predicted FINISHING positions from the bracket (consistent with the
  // Bracket/Final tabs): champion, beaten finalist, and 3rd-place match winner —
  // NOT just the top-3 by title odds (which made "Spain beats France in the final"
  // disagree with who showed up as 2nd).
  // Champion identity comes from the FINAL winner (so the podium always matches the
  // shown bracket); B.champion is a separately-computed sim modal that can diverge.
  const champ=(B.final&&B.final.winner&&B.final.winner!=='TBD')?B.final.winner:(B.champion||'');
  const runner=(B.final.winner===B.final.home)?B.final.away:B.final.home;
  const bronze=B.third_place.winner;
  const wp=t=>R[t]?(R[t].win*100).toFixed(1)+'% to win':'';
  const medal=(t,cls,sym,role)=>`<div class="pod ${cls}"><div>${FL[t]?`<img src="${fi(FL[t])}" style="height:32px;border-radius:2px">`:''}
      </div><div class="pod-bar"><div class="pod-medal">${sym}</div></div>
      <div class="pod-name">${t}</div><div class="pod-pct">${role}</div></div>`;
  let h=`<div class="podium-wrap"><div class="sec">Predicted Tournament Winner</div>
  <div style="text-align:center;margin:14px 0">
    <div>${FL[champ]?`<img src="${fi(FL[champ])}" style="height:48px;border-radius:3px">`:'&#127942;'}</div>
    <div style="font-size:1.4rem;font-weight:600;color:var(--red);margin-top:6px">${champ}</div>
    <div style="color:var(--muted)">${wp(champ)}</div></div>
  <div class="sec">Predicted Final Standings</div>
  <div class="pod-stage">
    ${medal(runner,'pod-2','&#129352;','Runner-up')}
    ${medal(champ,'pod-1','&#129351;','Champion')}
    ${medal(bronze,'pod-3','&#129353;','3rd place')}
  </div>
  <div class="sec">Top 10 Contenders</div><table class="top10">`;
  ranked.slice(0,10).forEach(([t,r],i)=>{
    const bw=(r.win/mx*100).toFixed(1);const m=i===0?'&#127945;':i===1?'&#129352;':i===2?'&#129353;':'';
    h+=`<tr><td style="width:26px;color:var(--muted);font-weight:600">${i+1}</td>
      <td style="width:170px">${ft(t)} ${m}</td>
      <td><div class="top10-bar" style="width:${bw}%"></div></td>
      <td style="width:50px;text-align:right;font-weight:600">${(r.win*100).toFixed(1)}%</td></tr>`;
  });
  const fin=B.final,tp=B.third_place;
  h+=`</table><div class="sec" style="margin-top:20px">Predicted Final</div>
  <div class="fin-box"><div style="font-size:1.15rem;font-weight:600">${ft(fin.home)}
    <span style="color:var(--red)">${fin.score}</span> ${ft(fin.away)}</div>
    <div style="font-size:.83rem;color:var(--muted);margin-top:5px">Winner:
      <strong style="color:var(--red)">${fin.winner}</strong> &middot; ${fin.win_pct}% chance</div></div>
  <div style="font-size:.8rem;color:var(--muted);margin:8px 0 3px">3rd Place Match</div>
  <div class="fin-box" style="border-left-color:var(--border)"><div>${ft(tp.home)}
    <strong>${tp.score}</strong> ${ft(tp.away)}</div>
    <div style="font-size:.78rem;color:var(--muted);margin-top:4px">${tp.winner} &middot; ${tp.win_pct}%</div></div></div>`;
  document.getElementById('tab-podium').innerHTML=h;
})();
(function(){
  const s=AC.summary, ms=AC.matches||[];
  if(!s.total_matches){
    document.getElementById('tab-results').innerHTML=
      '<div style="padding:48px;text-align:center;color:var(--hint);font-size:.95rem">No results yet &mdash; check back once the tournament starts.</div>';
    return;
  }
  const brier_note=s.avg_brier<0.5?'good (baseline 0.67)':'vs baseline 0.67';
  let h=`<div class="acc-cards">
    <div class="acc-card"><div class="acc-lbl">Correct Winners</div>
      <div class="acc-val">${s.correct_winners}/${s.total_matches}</div>
      <div class="acc-sub">${(s.accuracy*100).toFixed(1)}% accuracy</div></div>
    <div class="acc-card"><div class="acc-lbl">Avg Goal Error</div>
      <div class="acc-val" style="color:var(--muted)">${s.avg_goal_error.toFixed(2)}</div>
      <div class="acc-sub">exact-score distance · not a quality score</div></div>
    <div class="acc-card"><div class="acc-lbl">Avg Brier Score</div>
      <div class="acc-val">${s.avg_brier.toFixed(3)}</div>
      <div class="acc-sub">${brier_note}</div></div>
    <div class="acc-card"><div class="acc-lbl">Avg Log-Loss</div>
      <div class="acc-val">${(s.avg_logloss||0).toFixed(3)}</div>
      <div class="acc-sub">lower better (rand 1.10)</div></div>
  </div>`;
  if(s.reliability&&s.reliability.length){
    h+=`<div style="margin:16px 0 6px;font-size:.82rem;color:var(--muted);font-weight:600">Calibration &mdash; model confidence vs how often it happened</div>
    <table style="margin-bottom:20px"><thead><tr>
      <th>Confidence</th><th style="text-align:center">Predicted</th>
      <th style="text-align:center">Actual</th><th style="text-align:center">Matches</th>
    </tr></thead><tbody>`;
    s.reliability.forEach(r=>{
      const diff=Math.abs(r.predicted-r.actual);
      const col=diff<=0.1?'var(--win)':diff<=0.2?'var(--draw)':'var(--lose)';
      h+=`<tr><td>${r.bin}</td>
        <td style="text-align:center;color:var(--hint)">${(r.predicted*100).toFixed(0)}%</td>
        <td style="text-align:center;color:${col};font-weight:600">${(r.actual*100).toFixed(0)}%</td>
        <td style="text-align:center;color:var(--hint)">${r.n}</td></tr>`;
    });
    h+='</tbody></table>';
  }
  if(s.actual_draw_rate!=null){
    h+=`<div style="margin:6px 0 16px;font-size:.8rem;color:var(--muted)">
      Draw calibration: predicted <strong>${(s.predicted_draw_rate*100).toFixed(0)}%</strong>
      vs actual <strong>${(s.actual_draw_rate*100).toFixed(0)}%</strong>
      &middot; ECE <strong>${(s.ece*100).toFixed(1)}%</strong> (lower = better calibrated)</div>`;
  }
  h+=`<table><thead><tr>
    <th>Date</th><th>Stage</th><th>Match</th>
    <th style="text-align:center">Predicted</th>
    <th style="text-align:center">Actual</th>
    <th style="text-align:center">Winner</th>
    <th style="text-align:center" title="Exact-score distance |predicted − actual| — not a quality score; see Correct Winner / Brier for call quality">Goal&nbsp;Err</th>
    <th style="text-align:center">Brier</th>
  </tr></thead><tbody>`;
  [...ms].reverse().forEach(m=>{   // newest match first
    const ok=m.correct_winner;
    const wmark=ok?'<span class="res-ok">&#10003;</span>':'<span class="res-err">&#10007;</span>';
    const errCol='var(--hint)';   // goal error = exact-score distance, not a quality grade — keep it neutral
    h+=`<tr>
      <td style="color:var(--hint);font-size:.78rem;white-space:nowrap">${m.date}</td>
      <td style="color:var(--hint);font-size:.78rem">${/^[A-L]$/.test(m.group)?'Grp '+m.group:m.group}</td>
      <td>${ft(m.home)} <span style="color:var(--hint)">vs</span> ${ft(m.away)}</td>
      <td style="text-align:center;color:var(--hint)">${m.predicted_score}</td>
      <td style="text-align:center;font-weight:700">${m.actual_score}</td>
      <td style="text-align:center">${wmark} ${ft(m.actual_winner)}</td>
      <td style="text-align:center;color:${errCol};font-weight:600">${m.total_goal_error}</td>
      <td style="text-align:center;color:var(--hint);font-size:.8rem">${m.brier.toFixed(3)}</td>
    </tr>`;
  });
  h+='</tbody></table>';
  document.getElementById('tab-results').innerHTML=h;
})();
</script>
</body>
</html>
